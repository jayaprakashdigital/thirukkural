<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Script Detail — AI Content Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css?v=3">
  <link rel="stylesheet" href="css/dashboard.css?v=3">
  <link rel="stylesheet" href="css/prompts.css">
  <link rel="stylesheet" href="css/script-detail.css">
  <script>
    (function () {
      var t = localStorage.getItem("thirukkural-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body class="dashboard-body">
  <div class="bg-scene" aria-hidden="true"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon">AI</span>
          <span class="sidebar-brand-text">
            <strong>Content Studio</strong>
            <span>Thirukkural Project</span>
          </span>
        </a>
        <button type="button" class="ui-btn-icon sidebar-close" id="sidebar-close" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Admin navigation"></nav>

      <div class="sidebar-footer">
        <a href="index.html" class="sidebar-back-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
          Back to Public Site
        </a>
      </div>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="topbar-left">
          <button type="button" class="ui-btn-icon topbar-menu-btn" id="sidebar-open" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="topbar-title">Script Detail</h1>
            <div class="topbar-breadcrumb">
              <a href="prompts.html" style="color: inherit; text-decoration: none;">Scripts</a>
              <span>/</span>
              <span id="breadcrumb-kural">—</span>
            </div>
          </div>
        </div>
        <div class="topbar-right">
          <button type="button" class="ui-btn-icon" id="theme-toggle" aria-label="Switch theme"></button>
          <div class="topbar-user">
            <span class="topbar-avatar">AD</span>
            <span class="topbar-user-info">
              <span class="topbar-user-name">Admin</span>
              <span class="topbar-user-role">Content Manager</span>
            </span>
          </div>
        </div>
      </header>

      <main class="admin-content" id="script-detail-root">

        <!-- Script Header -->
        <section class="script-detail-header ui-card">
          <div class="ui-card-body">
            <div class="sd-header-top">
              <div class="sd-header-info">
                <div class="sd-header-badges">
                  <span class="kural-badge" id="sd-kural-id">TK-0000</span>
                  <span class="ui-badge ui-badge-muted" id="sd-theme">Theme</span>
                  <span class="ui-badge ui-badge-warning" id="sd-status">Draft</span>
                </div>
                <h1 class="sd-title" id="sd-title">Script Title</h1>
                <div class="sd-meta-row">
                  <span><strong id="sd-scene-count">0</strong> scenes</span>
                  <span class="sd-meta-dot">•</span>
                  <span><strong id="sd-duration">0:00</strong> total</span>
                  <span class="sd-meta-dot">•</span>
                  <span>Updated <strong id="sd-updated">—</strong></span>
                </div>
              </div>
              <div class="sd-header-actions">
                <button type="button" class="ui-btn" id="generate-script-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                  Regenerate Script
                </button>
                <button type="button" class="ui-btn ui-btn-primary" id="add-scene-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  Add Scene
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- Story Preview (readonly) -->
        <section class="ui-card sd-story-preview">
          <div class="ui-card-header">
            <h2 class="ui-card-title">Story Preview</h2>
            <span class="ui-card-subtitle">Read-only — sourced from Story Library</span>
          </div>
          <div class="ui-card-body">
            <p id="sd-story-text" class="sd-story-text"></p>
            <div class="sd-kural-box">
              <p class="sd-kural-tamil" id="sd-kural-tamil"></p>
              <p class="sd-kural-en" id="sd-kural-en"></p>
            </div>
          </div>
        </section>

        <!-- Scene Timeline -->
        <section class="ui-card sd-timeline-section">
          <div class="ui-card-header">
            <h2 class="ui-card-title">Scene Timeline</h2>
            <span class="ui-card-subtitle">Click a scene to edit</span>
          </div>
          <div class="ui-card-body">
            <div class="scene-timeline" id="scene-timeline"></div>
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- Scene Editor Modal -->
  <div class="prompt-modal" id="scene-editor-modal">
    <div class="modal-overlay" id="scene-modal-overlay"></div>
    <div class="modal-content scene-editor-content">
      <button type="button" class="modal-close" id="scene-modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="scene-editor-body" class="modal-body"></div>
    </div>
  </div>

  <script src="js/dashboard.js?v=4"></script>
  <script src="js/scripts-data.js"></script>
  <script src="js/script-detail.js"></script>
</body>
</html>
