<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Library — AI Content Studio</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=5">
  <link rel="stylesheet" href="css/dashboard.css?v=5">
  <link rel="stylesheet" href="css/characters.css?v=4">
  <script>
    (function () {
      var t = localStorage.getItem("thirukkural-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body class="dashboard-body">
  <div class="bg-scene" aria-hidden="true"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon">AI</span>
          <span class="sidebar-brand-text">
            <strong>Content Studio</strong>
            <span>Thirukkural Project</span>
          </span>
        </a>
        <button type="button" class="ui-btn-icon sidebar-close" id="sidebar-close" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Admin navigation"></nav>
      
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="topbar-left">
          <button type="button" class="ui-btn-icon topbar-menu-btn" id="sidebar-open" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="topbar-title">Character Library</h1>
            <div class="topbar-breadcrumb"><span>Admin</span><span>/</span><span>Content</span></div>
          </div>
        </div>
        <div class="topbar-right">
          <button type="button" class="ui-btn-icon" id="theme-toggle" aria-label="Switch theme"></button>
          <div class="topbar-user"><span class="topbar-avatar">AD</span><span class="topbar-user-info"><span class="topbar-user-name">Admin</span><span class="topbar-user-role">Content Manager</span></span></div>
        </div>
      </header>

      <main class="admin-content">
        <!-- Stats Header -->
        <section class="char-stats-grid" id="char-stats-grid"></section>

        <!-- Action Bar -->
        <section class="char-action-bar">
          <button type="button" class="ui-btn ui-btn-primary" id="add-character-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Character
          </button>
          <button type="button" class="ui-btn" id="import-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>Import</button>
          <button type="button" class="ui-btn" id="export-all-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export All</button>
          <button type="button" class="ui-btn" id="bulk-lock-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Bulk Lock</button>
        </section>

        <!-- Filters -->
        <section class="char-filters">
          <div class="char-filter-group"><label for="search-input">Search</label><input type="text" id="search-input" class="filter-input" placeholder="Name, ID, kural..."></div>
          <div class="char-filter-group"><label for="role-filter">Role</label><select id="role-filter" class="filter-select"><option value="">All</option></select></div>
          <div class="char-filter-group"><label for="gender-filter">Gender</label><select id="gender-filter" class="filter-select"><option value="">All</option><option>Male</option><option>Female</option><option>Divine</option><option>Gender-neutral</option></select></div>
          <div class="char-filter-group"><label for="age-filter">Age Group</label><select id="age-filter" class="filter-select"><option value="">All</option><option>Child (0-12)</option><option>Teen (13-19)</option><option>Young (20-35)</option><option>Middle (35-50)</option><option>Mature (50+)</option></select></div>
          <div class="char-filter-group"><label for="status-filter">Status</label><select id="status-filter" class="filter-select"><option value="">All</option><option>Active</option><option>Locked</option><option>Archived</option></select></div>
          <div class="char-filter-group"><label for="sort-filter">Sort</label><select id="sort-filter" class="filter-select"><option value="recent">Recently Updated</option><option value="name">Name (A-Z)</option><option value="kural">Kural</option></select></div>
        </section>

        <!-- Character Grid -->
        <section class="char-grid-section">
          <div class="char-grid" id="char-grid"></div>
          <div class="char-empty" id="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <h3>No characters found</h3><p>Try adjusting filters or add a new character</p>
          </div>
          <div class="char-pager" id="char-pager"></div>
        </section>
      </main>
    </div>
  </div>

  <!-- Character Profile Drawer -->
  <div class="char-drawer" id="char-drawer">
    <div class="char-drawer-overlay" id="drawer-overlay"></div>
    <div class="char-drawer-panel" id="drawer-panel">
      <button type="button" class="char-drawer-close" id="drawer-close" aria-label="Close profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="drawer-body"></div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" style="display:none">

  <script src="js/shared.js?v=3"></script>
  <script src="js/dashboard.js?v=6"></script>
  <script src="js/media-data.js?v=1"></script>
  <script src="js/kural-characters.js?v=1"></script>
  <script src="js/characters-data.js?v=4"></script>
  <script src="js/character-derive.js?v=1"></script>
  <script src="js/characters.js?v=5"></script>
</body>
</html>
