name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check webhook server
        run: node --check deploy-webhook.js

      - name: Run tests
        run: npm test

  validate-infra:
    name: Validate infrastructure files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml config >/dev/null
          fi

      - name: Validate Dockerfile builds
        run: |
          if [ -f Dockerfile ]; then
            docker build -t thirukkural-webhook:ci .
          fi

  deploy:
    name: Deploy to VPS (main only)
    needs: [test, validate-infra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger VPS webhook
        if: ${{ secrets.VPS_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -fsS -X POST "${{ secrets.VPS_DEPLOY_WEBHOOK_URL }}" \
            -H "X-GitHub-Event: push" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}'
