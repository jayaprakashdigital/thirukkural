<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos Library — AI Content Studio</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Noto+Sans+Tamil:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=5">
  <link rel="stylesheet" href="css/dashboard.css?v=5">
  <link rel="stylesheet" href="css/videos.css?v=2">
  <script>
    (function () {
      var t = localStorage.getItem("thirukkural-theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body class="dashboard-body">
  <div class="bg-scene" aria-hidden="true"></div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="sidebar-brand">
          <span class="sidebar-brand-icon">AI</span>
          <span class="sidebar-brand-text">
            <strong>Content Studio</strong><span>Thirukkural Project</span>
          </span>
        </a>
        <button type="button" class="ui-btn-icon sidebar-close" id="sidebar-close" aria-label="Close menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Admin navigation"></nav>
      
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <div class="topbar-left">
          <button type="button" class="ui-btn-icon topbar-menu-btn" id="sidebar-open" aria-label="Open menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="topbar-title">Videos Library</h1>
            <div class="topbar-breadcrumb"><span>Admin</span><span>/</span><span>Media</span></div>
          </div>
        </div>
        <div class="topbar-right">
          <button type="button" class="ui-btn-icon" id="theme-toggle" aria-label="Switch theme"></button>
          <div class="topbar-user">
            <span class="topbar-avatar">AD</span>
            <span class="topbar-user-info">
              <span class="topbar-user-name">Admin</span>
              <span class="topbar-user-role">Content Manager</span>
            </span>
          </div>
        </div>
      </header>

      <main class="admin-content">
        <section class="videos-header">
          <div>
            <h1>Videos Library</h1>
            <p>Manage, review and publish generated Thirukkural videos.</p>
          </div>
          <div class="videos-header-actions">
            <button type="button" class="ui-btn" id="publish-all-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Publish All</button>
            <button type="button" class="ui-btn ui-btn-primary" id="download-all-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><polyline points="12 15 12 3"/></svg> Download All</button>
          </div>
        </section>

        <section class="videos-stats" id="videos-stats"></section>

        <section class="videos-toolbar">
          <div class="videos-toolbar-row">
            <div class="videos-filter-group videos-search-group">
              <svg class="videos-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="search-input" class="videos-search-input" placeholder="Search by kural number, title, theme, filename...">
            </div>
            <div class="videos-filter-group">
              <label for="status-filter">Status</label>
              <select id="status-filter" class="videos-select">
                <option value="">All</option>
                <option value="published">Published</option>
                <option value="rendering">Rendering</option>
                <option value="scheduled">Scheduled</option>
                <option value="draft">Draft</option>
                <option value="failed">Failed</option>
              </select>
            </div>
            <div class="videos-filter-group">
              <label for="sort-filter">Sort by</label>
              <select id="sort-filter" class="videos-select">
                <option value="kural-asc">Kural (1–1330)</option>
                <option value="kural-desc">Kural (1330–1)</option>
                <option value="updated">Recently Updated</option>
                <option value="duration">Duration</option>
                <option value="views">Views</option>
                <option value="likes">Likes</option>
              </select>
            </div>
            <div class="videos-view-toggle" role="group" aria-label="View mode">
              <button type="button" class="videos-view-btn active" data-view="grid" id="view-grid" aria-label="Grid view" title="Grid view">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              </button>
              <button type="button" class="videos-view-btn" data-view="list" id="view-list" aria-label="List view" title="List view">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
          </div>
        </section>

        <section class="videos-bulk-actions" id="bulk-actions" style="display:none">
          <button type="button" class="ui-btn ui-btn-sm" id="select-all">Select All</button>
          <span class="videos-bulk-count" id="selected-count">0 selected</span>
          <div class="videos-bulk-buttons">
            <button type="button" class="ui-btn ui-btn-sm" id="bulk-publish"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> Publish</button>
            <button type="button" class="ui-btn ui-btn-sm" id="bulk-download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><polyline points="12 15 12 3"/></svg> Download</button>
            <button type="button" class="ui-btn ui-btn-sm" id="bulk-schedule"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Schedule</button>
            <button type="button" class="ui-btn ui-btn-sm" id="bulk-copy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy Metadata</button>
            <button type="button" class="ui-btn ui-btn-sm ui-btn-danger" id="bulk-delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> Delete</button>
          </div>
          <button type="button" class="ui-btn ui-btn-sm videos-bulk-clear" id="clear-selection">Clear selection</button>
        </section>

        <section class="videos-content" id="videos-content">
          <div class="videos-empty" id="videos-empty" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <h3>No videos available</h3>
            <p>Generate videos from the Prompts page to see them here.</p>
            <a href="prompts.html" class="ui-btn ui-btn-primary">Go to Prompts</a>
          </div>
          <div class="videos-grid" id="videos-grid"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="videos-modal" id="video-modal" role="dialog" aria-modal="true" aria-label="Video player">
    <div class="videos-modal-overlay" id="modal-overlay"></div>
    <div class="videos-modal-content">
      <div class="videos-modal-top">
        <div class="videos-modal-player">
          <div class="videos-modal-player-placeholder" id="modal-player">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <span>Video Player</span>
          </div>
        </div>
        <div class="videos-modal-meta" id="modal-meta"></div>
      </div>
      <div class="videos-modal-bottom" id="modal-actions"></div>
      <button type="button" class="videos-modal-close" id="modal-close" aria-label="Close">?</button>
    </div>
  </div>

  <script src="js/shared.js?v=4"></script>
  <script src="js/dashboard.js?v=5"></script>
  <script src="js/media-data.js?v=4"></script>
  <script src="js/videos.js?v=2"></script>
</body>
</html>
