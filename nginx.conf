# nginx configuration for the Thirukkural static site.
# Serves the static front-end on :80 and reverse-proxies the
# GitHub webhook + health endpoints to the `webhook` service on :3600.
#
# Mount this file at /etc/nginx/conf.d/default.conf when used with docker-compose.

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # --- Compression ---------------------------------------------------------
    gzip              on;
    gzip_min_length   1024;
    gzip_comp_level   5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # --- Static asset caching ------------------------------------------------
    location ~* \.(?:css|js|json|svg|png|jpe?g|gif|ico|woff2?|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- Webhook reverse proxy -----------------------------------------------
    # Forward /webhook/* and /health to the Node webhook service.
    location /webhook/ {
        proxy_pass         http://webhook:3600;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass         http://webhook:3600;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # --- Kural Studio API reverse proxy --------------------------------------
    # Forward /studio/* (status, generate, image proxy) to the studio service.
    # Generated images stream through here — browsers never see Drive links.
    location /studio/ {
        proxy_pass         http://studio:3700;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
    }

    # --- SPA-style fallback --------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy       "no-referrer-when-downgrade" always;
}
